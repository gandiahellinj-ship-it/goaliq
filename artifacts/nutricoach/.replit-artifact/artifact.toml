kind = "web"
previewPath = "/"
title = "NutriCoach"
version = "1.0.0"
id = "artifacts/nutricoach"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18118

[services.development]
run = "pnpm --filter @workspace/nutricoach run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutricoach", "run", "build" ]
publicDir = "artifacts/nutricoach/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18118"
BASE_PATH = "/"
